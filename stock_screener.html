<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Stockhut — Screener</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root{--bg:#09090f;--bg2:#111118;--bg3:#18181f;--bg4:#21212b;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);--text:#eeeef2;--muted:#5f5f78;--soft:#9898b0;--purple:#7c6fff;--teal:#4ecdc4;--green:#2ecc8a;--red:#ff5263;--amber:#f9a825;--nav-h:52px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow-x:hidden}

/* NAV */
.topnav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:rgba(9,9,15,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.logo-mark{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text)}
.logo-name{font-size:15px;font-weight:800;letter-spacing:-.4px}
.logo-tld{color:var(--teal)}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-btn{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;color:var(--muted);border:1px solid var(--border2);background:transparent;cursor:pointer;font-family:'Syne',sans-serif;transition:all .15s}
.nav-btn:hover{color:var(--text);border-color:var(--purple)}
.nav-btn.active{color:var(--purple);border-color:var(--purple);background:rgba(124,111,255,0.08)}
.user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#7c6fff,#4ecdc4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;cursor:pointer;flex-shrink:0}

/* LAYOUT */
.page{margin-top:var(--nav-h);padding:20px;max-width:1200px;margin-left:auto;margin-right:auto}

/* REFRESH BAR */
.refresh-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:8px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px}
.refresh-status{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;display:flex;align-items:center;gap:6px}
.refresh-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.refresh-dot.stale{background:var(--amber);animation:none}
.refresh-dot.error{background:var(--red);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.refresh-actions{display:flex;align-items:center;gap:8px}
.btn-refresh{display:flex;align-items:center;gap:5px;padding:5px 11px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;font-size:11px;color:var(--soft);cursor:pointer;font-family:'DM Mono',monospace;transition:all .15s}
.btn-refresh:hover{color:var(--text);border-color:var(--teal)}
.btn-refresh.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tab-bar{display:flex;gap:2px;background:var(--bg3);border-radius:8px;padding:3px;margin-bottom:16px;width:fit-content}
.tab{padding:6px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s;border:none;background:transparent;font-family:'Syne',sans-serif}
.tab.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.3)}

/* SCREENER TABLE */
.screener-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.screener-title{font-size:16px;font-weight:800;letter-spacing:-.4px}
.screener-actions{display:flex;gap:8px;align-items:center}
.btn-add{display:flex;align-items:center;gap:5px;padding:7px 14px;background:var(--purple);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all .15s}
.btn-add:hover{background:#6858e8}
.public-toggle{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--soft);cursor:pointer}
.toggle-switch{width:32px;height:18px;border-radius:9px;background:var(--bg4);border:1px solid var(--border2);position:relative;transition:background .2s;cursor:pointer;flex-shrink:0}
.toggle-switch.on{background:var(--teal);border-color:var(--teal)}
.toggle-knob{width:12px;height:12px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:transform .2s}
.toggle-switch.on .toggle-knob{transform:translateX(14px)}

/* ADD TICKER FORM */
.add-ticker-form{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;margin-bottom:14px;display:none}
.add-ticker-form.show{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.add-form-field{display:flex;flex-direction:column;gap:4px}
.add-form-field label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.ticker-input{background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:8px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;transition:border-color .15s;width:130px;text-transform:uppercase}
.ticker-input:focus{border-color:var(--teal)}
.ticker-input::placeholder{color:var(--muted)}
.ticker-name-input{width:180px;text-transform:none}
.btn-add-confirm{padding:8px 16px;background:var(--teal);color:#09090f;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif}
.btn-cancel-add{padding:8px 14px;background:transparent;color:var(--muted);border:1px solid var(--border2);border-radius:7px;font-size:12px;cursor:pointer;font-family:'Syne',sans-serif}
.add-error{font-size:11px;color:var(--red);margin-top:4px}

/* TABLE */
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--bg3);border-bottom:1px solid var(--border2)}
th{padding:9px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-family:'DM Mono',monospace;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--soft)}
th.sorted{color:var(--teal)}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.ticker-cell{display:flex;align-items:center;gap:8px}
.ticker-sym{font-family:'DM Mono',monospace;font-weight:700;font-size:13px;color:var(--teal);cursor:pointer;transition:color .15s}
.ticker-sym:hover{color:#fff;text-decoration:underline}
.ticker-name{font-size:11px;color:var(--muted)}
.price-val{font-family:'DM Mono',monospace;font-weight:600}
.chg-pos{color:var(--green);font-family:'DM Mono',monospace;font-size:12px}
.chg-neg{color:var(--red);font-family:'DM Mono',monospace;font-size:12px}
.chg-neu{color:var(--muted);font-family:'DM Mono',monospace;font-size:12px}
.loading-cell{color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%,100%{opacity:.4}50%{opacity:1}}
.btn-remove{padding:3px 8px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:4px;font-size:10px;cursor:pointer;font-family:'DM Mono',monospace;transition:all .15s}
.btn-remove:hover{color:var(--red);border-color:var(--red)}
.rsi-bar{display:flex;align-items:center;gap:6px}
.rsi-val{font-family:'DM Mono',monospace;font-size:12px;min-width:32px}
.rsi-indicator{width:8px;height:8px;border-radius:50%}

/* WATCHLIST */
.watchlist-grid{display:grid;gap:10px}
.wl-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;transition:border-color .15s}
.wl-card:hover{border-color:var(--border2)}
.wl-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.wl-ticker{font-family:'DM Mono',monospace;font-weight:700;font-size:15px;color:var(--teal);cursor:pointer}
.wl-ticker:hover{color:#fff}
.wl-name{font-size:12px;color:var(--muted);margin-top:2px}
.wl-price{font-family:'DM Mono',monospace;font-weight:700;font-size:16px;text-align:right}
.wl-chg{font-size:11px;text-align:right;margin-top:2px;font-family:'DM Mono',monospace}
.wl-meta{display:flex;gap:10px;flex-wrap:wrap}
.wl-tag{font-size:11px;padding:3px 8px;border-radius:4px;background:var(--bg3);color:var(--soft);font-family:'DM Mono',monospace;border:1px solid var(--border)}
.wl-thesis{font-size:12px;color:var(--soft);margin-top:8px;line-height:1.5;border-top:1px solid var(--border);padding-top:8px}
.wl-pnl-pos{color:var(--green)}
.wl-pnl-neg{color:var(--red)}

/* STOCK MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,0.7)}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;padding:20px 22px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:10}
.modal-ticker{font-family:'DM Mono',monospace;font-size:22px;font-weight:700;color:var(--teal)}
.modal-name{font-size:13px;color:var(--soft);margin-top:2px}
.modal-price-block{text-align:right}
.modal-price{font-family:'DM Mono',monospace;font-size:24px;font-weight:700}
.modal-chg{font-size:13px;font-family:'DM Mono',monospace;margin-top:2px}
.modal-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;flex-shrink:0;margin-left:12px}
.modal-close:hover{color:var(--text);border-color:var(--border2)}
.modal-body{padding:20px 22px}
.modal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.modal-stat{background:var(--bg3);border-radius:8px;padding:11px 12px;border:1px solid var(--border)}
.modal-stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;font-family:'DM Mono',monospace}
.modal-stat-val{font-size:15px;font-weight:700;font-family:'DM Mono',monospace}
.modal-chart-wrap{background:var(--bg3);border-radius:10px;padding:14px;margin-bottom:18px;border:1px solid var(--border)}
.modal-chart-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;font-family:'DM Mono',monospace}
.modal-posts{margin-top:4px}
.modal-posts-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;font-family:'DM Mono',monospace}
.modal-post{background:var(--bg3);border-radius:8px;padding:10px 12px;margin-bottom:7px;border:1px solid var(--border)}
.modal-post-meta{font-size:11px;color:var(--muted);margin-bottom:4px;font-family:'DM Mono',monospace}
.modal-post-text{font-size:13px;line-height:1.5}
.modal-loading{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.modal-spinner{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
.empty-posts{font-size:12px;color:var(--muted);font-style:italic;padding:8px 0}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:60px;background:rgba(9,9,15,0.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:none;align-items:center;justify-content:space-around;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 12px;text-decoration:none;color:var(--muted);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;transition:color .15s}
.bnav-item.active{color:var(--purple)}
.bnav-icon{font-size:19px;line-height:1}

@media(max-width:768px){
  .bottom-nav{display:flex}
  .page{padding:14px 12px;padding-bottom:76px}
  .modal-stats{grid-template-columns:1fr 1fr}
  .add-ticker-form.show{flex-direction:column}
  .ticker-input,.ticker-name-input{width:100%}
}
@media(min-width:769px){.bottom-nav{display:none}}
</style>
</head>
<body>

<div class="topnav">
  <a class="logo-mark" href="community.html">
    <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
      <rect x="6" y="16" width="20" height="14" rx="2" fill="#1e1e35" stroke="#7c6fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="4,18 16,5 28,18" fill="none" stroke="#7c6fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="12" y="22" width="8" height="8" rx="1" fill="#09090f" stroke="#7c6fff" stroke-width="1.2"/>
      <polyline points="4,24 9,19 14,21 20,15 27,10" fill="none" stroke="#4ecdc4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="20" cy="15" r="1.8" fill="#4ecdc4"/>
      <circle cx="27" cy="10" r="2.2" fill="#4ecdc4"/>
    </svg>
    <span class="logo-name">Stockhut<span class="logo-tld">.co</span></span>
  </a>
  <div class="nav-right">
    <a class="nav-btn" href="community.html">Feed</a>
    <a class="nav-btn active" href="stock_screener.html">Screener</a>
    <a class="nav-btn" id="nav-portfolio" href="portfolio_dashboard.html" style="display:none">Portfolio</a>
    <div class="user-avatar" id="user-avatar">?</div>
  </div>
</div>

<div class="page">
  <!-- REFRESH BAR -->
  <div class="refresh-bar">
    <div class="refresh-status">
      <div class="refresh-dot" id="refresh-dot"></div>
      <span id="refresh-status-text">Loading prices...</span>
    </div>
    <div class="refresh-actions">
      <div id="public-toggle-wrap" class="public-toggle" onclick="togglePublic()">
        <div class="toggle-switch" id="public-toggle-switch"><div class="toggle-knob"></div></div>
        <span id="public-toggle-label">Private</span>
      </div>
      <button class="btn-refresh" id="refresh-btn" onclick="refreshPrices()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        Refresh
      </button>
    </div>
  </div>

  <!-- TABS -->
  <div class="tab-bar">
    <button class="tab active" id="tab-screener" onclick="switchTab('screener')">⚡ Screener</button>
    <button class="tab" id="tab-watchlist" onclick="switchTab('watchlist')">📋 My Watchlist</button>
  </div>

  <!-- SCREENER TAB -->
  <div id="view-screener">
    <div class="screener-header">
      <div class="screener-title">Earnings Screener</div>
      <div class="screener-actions">
        <button class="btn-add" onclick="toggleAddForm()">+ Add Ticker</button>
      </div>
    </div>

    <!-- ADD TICKER FORM -->
    <div class="add-ticker-form" id="add-ticker-form">
      <div class="add-form-field">
        <label>Ticker Symbol</label>
        <input class="ticker-input" id="new-ticker" placeholder="e.g. RKLB" maxlength="12" oninput="this.value=this.value.toUpperCase()">
      </div>
      <div class="add-form-field">
        <label>Company Name</label>
        <input class="ticker-input ticker-name-input" id="new-name" placeholder="e.g. Rocket Lab">
      </div>
      <div style="display:flex;gap:6px;align-items:flex-end">
        <button class="btn-add-confirm" onclick="addTicker()">Add</button>
        <button class="btn-cancel-add" onclick="toggleAddForm()">Cancel</button>
      </div>
      <div class="add-error" id="add-error"></div>
    </div>

    <div class="table-wrap">
      <table id="screener-table">
        <thead>
          <tr>
            <th onclick="sortTable('symbol')">Ticker</th>
            <th onclick="sortTable('price')">Price</th>
            <th onclick="sortTable('change')">Day %</th>
            <th onclick="sortTable('change1w')">1W %</th>
            <th onclick="sortTable('change1m')">1M %</th>
            <th onclick="sortTable('rsi')">RSI(14)</th>
            <th onclick="sortTable('pe')">P/E</th>
            <th onclick="sortTable('volume')">Volume</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="screener-body">
          <tr><td colspan="9" style="text-align:center;padding:32px;color:var(--muted);font-size:13px">Loading your screener...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- WATCHLIST TAB -->
  <div id="view-watchlist" style="display:none">
    <div class="screener-header">
      <div class="screener-title">My Watchlist</div>
      <button class="btn-add" onclick="showAddWatchlist()">+ Add Position</button>
    </div>
    <div class="watchlist-grid" id="watchlist-grid">
      <div style="text-align:center;padding:32px;color:var(--muted);font-size:13px">Loading watchlist...</div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a class="bnav-item" href="community.html"><span class="bnav-icon">📰</span>Feed</a>
  <a class="bnav-item active" href="stock_screener.html"><span class="bnav-icon">⚡</span>Screener</a>
  <a class="bnav-item" id="bn-portfolio" href="portfolio_dashboard.html" style="display:none"><span class="bnav-icon">📊</span>Portfolio</a>
</nav>

<!-- STOCK DETAIL MODAL -->
<div class="modal-overlay" id="stock-modal" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <div class="modal-loading"><div class="modal-spinner"></div>Loading...</div>
  </div>
</div>

<script>
var _supa = window.supabase.createClient(
  'https://wmuywxaglwcfqceppxll.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndtdXl3eGFnbHdjZnFjZXBweGxsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NzM3NTcsImV4cCI6MjA5NDE0OTc1N30.HXNXSEMO6pfODeIqPIVQ1AHNRiK7KsVnSH7TKS_Q3Y0'
);
var OWNER_EMAIL = 'brendon.knoetze@gmail.com';
var currentUser = null;
var priceCache = {};
var lastRefresh = null;
var refreshTimer = null;
var screenerTickers = [];
var watchlistItems = [];
var isPublic = false;
var currentTab = 'screener';
var sortCol = 'symbol';
var sortDir = 1;
var modalChart = null;

// DEFAULT TICKERS — used first time, then user can customise
var DEFAULT_TICKERS = [
  {symbol:'RKLB',name:'Rocket Lab'},
  {symbol:'PLTR',name:'Palantir'},
  {symbol:'NBIS',name:'Nebius NV'},
  {symbol:'MU',name:'Micron'},
  {symbol:'NVDA',name:'NVIDIA'},
  {symbol:'TSLA',name:'Tesla'},
  {symbol:'AAPL',name:'Apple'},
  {symbol:'MSFT',name:'Microsoft'},
  {symbol:'META',name:'Meta'},
  {symbol:'AMZN',name:'Amazon'},
  {symbol:'GOOGL',name:'Alphabet'},
  {symbol:'AMD',name:'AMD'},
  {symbol:'ARM',name:'ARM Holdings'},
  {symbol:'IONQ',name:'IonQ'},
  {symbol:'RXRX',name:'Recursion Pharma'},
  {symbol:'III.L',name:'3i Group'},
  {symbol:'LLOY.L',name:'Lloyds Banking'},
];

async function init() {
  var r = await _supa.auth.getSession();
  if (!r.data.session) { window.location.href='login.html'; return; }
  currentUser = r.data.session.user;
  var name = currentUser.user_metadata&&currentUser.user_metadata.full_name ? currentUser.user_metadata.full_name : currentUser.email;
  var initials = name.split(' ').map(function(n){return n[0];}).join('').toUpperCase().slice(0,2);
  document.getElementById('user-avatar').textContent = initials;
  if (currentUser.email === OWNER_EMAIL) {
    document.getElementById('nav-portfolio').style.display='inline-flex';
    document.getElementById('bn-portfolio').style.display='flex';
  }
  await loadUserScreener();
  await loadWatchlist();
  startAutoRefresh();
}

// ── SCREENER TICKERS (personal, stored in Supabase) ──
async function loadUserScreener() {
  // Try to load from watchlist table with type='screener'
  var r = await _supa.from('watchlist')
    .select('*')
    .eq('user_id', currentUser.id)
    .eq('list_type', 'screener')
    .order('created_at', {ascending:true});

  if (r.data && r.data.length) {
    screenerTickers = r.data.map(function(w){ return {symbol:w.ticker, name:w.company_name||w.ticker, id:w.id}; });
    isPublic = r.data[0].is_public || false;
  } else {
    // First time — seed with defaults
    screenerTickers = DEFAULT_TICKERS.map(function(t){ return {symbol:t.symbol, name:t.name}; });
    // Save defaults to Supabase
    for (var i=0; i<screenerTickers.length; i++) {
      var t = screenerTickers[i];
      var ins = await _supa.from('watchlist').insert({
        user_id:currentUser.id, ticker:t.symbol, company_name:t.name,
        list_type:'screener', is_public:false
      }).select().single();
      if (ins.data) t.id = ins.data.id;
    }
  }
  updatePublicToggle();
  renderScreenerLoading();
  await refreshPrices();
}

function updatePublicToggle() {
  var sw = document.getElementById('public-toggle-switch');
  var lbl = document.getElementById('public-toggle-label');
  if (isPublic) { sw.classList.add('on'); lbl.textContent='Public'; }
  else { sw.classList.remove('on'); lbl.textContent='Private'; }
}

async function togglePublic() {
  isPublic = !isPublic;
  updatePublicToggle();
  // Update all screener items
  for (var i=0; i<screenerTickers.length; i++) {
    if (screenerTickers[i].id) {
      await _supa.from('watchlist').update({is_public:isPublic}).eq('id',screenerTickers[i].id);
    }
  }
}

// ── PRICE FETCHING ──
async function refreshPrices() {
  var btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  setRefreshStatus('loading');

  var symbols = screenerTickers.map(function(t){ return t.symbol; });
  watchlistItems.forEach(function(w){ if(!symbols.includes(w.ticker)) symbols.push(w.ticker); });
  if (!symbols.length) { btn.classList.remove('spinning'); return; }

  try {
    // Use our Vercel serverless proxy — no CORS issues, reliable
    var resp = await fetch('/api/prices?symbols='+symbols.join(','), {signal:AbortSignal.timeout(15000)});
    if (!resp.ok) throw new Error('API error '+resp.status);
    var result = await resp.json();
    if (!result.ok) throw new Error(result.error || 'API failed');
    // Merge into priceCache
    Object.keys(result.data).forEach(function(sym){
      priceCache[sym] = result.data[sym];
    });
    lastRefresh = new Date();
    setRefreshStatus('ok');
  } catch(e) {
    console.warn('Price fetch failed:', e.message);
    setRefreshStatus('error');
  }

  btn.classList.remove('spinning');
  renderScreener();
  renderWatchlist();
}

function calcRSI(closes, period) {
  if (closes.length < period+1) return null;
  var gains=0, losses=0;
  for (var i=closes.length-period; i<closes.length; i++) {
    var diff = closes[i] - closes[i-1];
    if (diff>0) gains+=diff; else losses+=Math.abs(diff);
  }
  var avgGain=gains/period, avgLoss=losses/period;
  if (avgLoss===0) return 100;
  var rs=avgGain/avgLoss;
  return Math.round(100-(100/(1+rs)));
}

function setRefreshStatus(state) {
  var dot = document.getElementById('refresh-dot');
  var txt = document.getElementById('refresh-status-text');
  dot.className = 'refresh-dot';
  if (state==='loading') { txt.textContent='Refreshing prices...'; }
  else if (state==='ok') {
    var now = new Date();
    txt.textContent='Updated '+formatTime(now);
    // Schedule next update
    clearTimeout(refreshTimer);
    refreshTimer = setTimeout(refreshPrices, 60000);
  }
  else if (state==='error') {
    dot.classList.add('error');
    txt.textContent='Price update failed — click refresh to retry';
  }
}

function formatTime(d) {
  return d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function startAutoRefresh() {
  refreshTimer = setTimeout(refreshPrices, 60000);
}

// ── RENDER SCREENER ──
function renderScreenerLoading() {
  var rows = screenerTickers.map(function(t){
    return '<tr><td><div class="ticker-cell"><span class="ticker-sym" onclick="openModal(\''+t.symbol+'\',\''+t.name+'\')">'+t.symbol+'</span><span class="ticker-name">'+t.name+'</span></div></td>'+
      '<td class="loading-cell">—</td><td class="loading-cell">—</td><td class="loading-cell">—</td>'+
      '<td class="loading-cell">—</td><td class="loading-cell">—</td><td class="loading-cell">—</td><td class="loading-cell">—</td>'+
      '<td><button class="btn-remove" onclick="removeTicker(\''+t.symbol+'\')">✕</button></td></tr>';
  }).join('');
  document.getElementById('screener-body').innerHTML = rows || '<tr><td colspan="9" style="text-align:center;padding:32px;color:var(--muted)">No tickers yet — click + Add Ticker</td></tr>';
}

function renderScreener() {
  var rows = screenerTickers.map(function(t) {
    var p = priceCache[t.symbol];
    if (!p) return '<tr><td><div class="ticker-cell"><span class="ticker-sym" onclick="openModal(\''+t.symbol+'\',\''+escJ(t.name)+'\')">'+t.symbol+'</span><span class="ticker-name">'+t.name+'</span></div></td>'+
      '<td colspan="7" class="loading-cell" style="color:var(--muted)">No data</td>'+
      '<td><button class="btn-remove" onclick="removeTicker(\''+t.symbol+'\')">✕</button></td></tr>';

    var priceStr = p.price ? fmtPrice(p.price) : '—';
    var chgStr = p.change != null ? fmtChg(p.change)+'%' : '—';
    var chgCls = p.change>0?'chg-pos':p.change<0?'chg-neg':'chg-neu';
    var w1Str = p.change1w != null ? fmtChg(p.change1w)+'%' : '—';
    var w1Cls = p.change1w>0?'chg-pos':p.change1w<0?'chg-neg':'chg-neu';
    var m1Str = p.change1m != null ? fmtChg(p.change1m)+'%' : '—';
    var m1Cls = p.change1m>0?'chg-pos':p.change1m<0?'chg-neg':'chg-neu';
    var rsiHtml = p.rsi != null ? renderRSI(p.rsi) : '<span class="chg-neu">—</span>';
    var peStr = p.pe ? p.pe.toFixed(1) : '—';
    var volStr = p.volume ? fmtVol(p.volume) : '—';

    return '<tr>'+
      '<td><div class="ticker-cell"><span class="ticker-sym" onclick="openModal(\''+t.symbol+'\',\''+escJ(t.name)+'\')">'+t.symbol+'</span><span class="ticker-name">'+t.name+'</span></div></td>'+
      '<td class="price-val">'+priceStr+'</td>'+
      '<td class="'+chgCls+'">'+chgStr+'</td>'+
      '<td class="'+w1Cls+'">'+w1Str+'</td>'+
      '<td class="'+m1Cls+'">'+m1Str+'</td>'+
      '<td>'+rsiHtml+'</td>'+
      '<td class="chg-neu">'+peStr+'</td>'+
      '<td class="chg-neu">'+volStr+'</td>'+
      '<td><button class="btn-remove" onclick="removeTicker(\''+t.symbol+'\')">✕</button></td>'+
    '</tr>';
  }).join('');
  document.getElementById('screener-body').innerHTML = rows || '<tr><td colspan="9" style="text-align:center;padding:32px;color:var(--muted)">No tickers — click + Add Ticker</td></tr>';
}

function renderRSI(rsi) {
  var cls = rsi>=70?'chg-neg':rsi<=30?'chg-pos':'chg-neu';
  var dot = rsi>=70?'#ff5263':rsi<=30?'#2ecc8a':'#5f5f78';
  var label = rsi>=70?' OB':rsi<=30?' OS':'';
  return '<div class="rsi-bar"><div class="rsi-indicator" style="background:'+dot+'"></div><span class="rsi-val '+cls+'">'+rsi+label+'</span></div>';
}

// ── ADD / REMOVE TICKERS ──
function toggleAddForm() {
  document.getElementById('add-ticker-form').classList.toggle('show');
  document.getElementById('add-error').textContent='';
}

async function addTicker() {
  var sym = document.getElementById('new-ticker').value.trim().toUpperCase();
  var name = document.getElementById('new-name').value.trim() || sym;
  var errEl = document.getElementById('add-error');
  if (!sym) { errEl.textContent='Please enter a ticker symbol.'; return; }
  if (screenerTickers.find(function(t){ return t.symbol===sym; })) {
    errEl.textContent='That ticker is already in your screener.'; return;
  }
  var r = await _supa.from('watchlist').insert({
    user_id:currentUser.id, ticker:sym, company_name:name,
    list_type:'screener', is_public:isPublic
  }).select().single();
  if (r.error) { errEl.textContent='Failed to add ticker. Try again.'; return; }
  screenerTickers.push({symbol:sym, name:name, id:r.data.id});
  document.getElementById('new-ticker').value='';
  document.getElementById('new-name').value='';
  toggleAddForm();
  renderScreenerLoading();
  refreshPrices();
}

async function removeTicker(sym) {
  if (!confirm('Remove '+sym+' from your screener?')) return;
  var t = screenerTickers.find(function(t){ return t.symbol===sym; });
  if (t && t.id) await _supa.from('watchlist').delete().eq('id',t.id);
  screenerTickers = screenerTickers.filter(function(t){ return t.symbol!==sym; });
  renderScreener();
}

// ── WATCHLIST ──
async function loadWatchlist() {
  var r = await _supa.from('watchlist').select('*').eq('user_id',currentUser.id).eq('list_type','watchlist').order('created_at',{ascending:false});
  watchlistItems = r.data || [];
  renderWatchlist();
}

function renderWatchlist() {
  var grid = document.getElementById('watchlist-grid');
  if (!watchlistItems.length) {
    grid.innerHTML='<div style="text-align:center;padding:48px;color:var(--muted);font-size:13px">No positions yet — click + Add Position</div>';
    return;
  }
  grid.innerHTML = watchlistItems.map(function(w) {
    var p = priceCache[w.ticker];
    var priceStr = p&&p.price ? fmtPrice(p.price) : '—';
    var chgStr = p&&p.change!=null ? fmtChg(p.change)+'%' : '';
    var chgCls = p&&p.change>0?'wl-pnl-pos':p&&p.change<0?'wl-pnl-neg':'';
    var pnl = '';
    if (p&&p.price&&w.entry_price&&w.shares) {
      var pnlVal = (p.price-w.entry_price)*w.shares;
      var pnlPct = ((p.price-w.entry_price)/w.entry_price*100);
      pnl = (pnlVal>=0?'+':'')+pnlVal.toFixed(0)+' ('+(pnlVal>=0?'+':'')+pnlPct.toFixed(1)+'%)';
    }
    return '<div class="wl-card">'+
      '<div class="wl-card-header">'+
        '<div><div class="wl-ticker" onclick="openModal(\''+w.ticker+'\',\''+escJ(w.company_name||w.ticker)+'\')">'+w.ticker+'</div><div class="wl-name">'+(w.company_name||'')+'</div></div>'+
        '<div><div class="wl-price">'+priceStr+'</div><div class="wl-chg '+chgCls+'">'+chgStr+'</div></div>'+
      '</div>'+
      '<div class="wl-meta">'+
        (w.entry_price?'<span class="wl-tag">Entry: '+fmtPrice(w.entry_price)+'</span>':'')+
        (w.shares?'<span class="wl-tag">'+w.shares+' shares</span>':'')+
        (pnl?'<span class="wl-tag '+(pnl.startsWith('+')?'wl-pnl-pos':'wl-pnl-neg')+'">P&L: '+pnl+'</span>':'')+
      '</div>'+
      (w.thesis?'<div class="wl-thesis">'+escH(w.thesis)+'</div>':'')+
    '</div>';
  }).join('');
}

function showAddWatchlist() { alert('Add position feature coming soon — for now add directly in Supabase'); }

// ── STOCK DETAIL MODAL ──
async function openModal(symbol, name) {
  var overlay = document.getElementById('stock-modal');
  var content = document.getElementById('modal-content');
  overlay.classList.add('show');
  content.innerHTML = '<div class="modal-loading"><div class="modal-spinner"></div>Loading '+symbol+'...</div>';
  document.body.style.overflow='hidden';

  // Destroy previous chart
  if (modalChart) { modalChart.destroy(); modalChart=null; }

  var p = priceCache[symbol] || {};
  var priceStr = p.price ? fmtPrice(p.price) : '—';
  var chgStr = p.change!=null ? (p.change>=0?'+':'')+p.change.toFixed(2)+'%' : '—';
  var chgAmt = p.changeAmt!=null ? (p.changeAmt>=0?'+':'')+p.changeAmt.toFixed(2) : '';
  var chgCls = p.change>0?'chg-pos':p.change<0?'chg-neg':'chg-neu';

  // Fetch community posts about this ticker
  var postsR = await _supa.from('feed_posts').select('*,profiles(username)').eq('ticker',symbol).order('created_at',{ascending:false}).limit(5);
  var posts = postsR.data || [];

  var postsHtml = posts.length ? posts.map(function(post){
    return '<div class="modal-post">'+
      '<div class="modal-post-meta">@'+(post.profiles&&post.profiles.username?post.profiles.username:'member')+' &middot; '+getTimeAgo(post.created_at)+'</div>'+
      '<div class="modal-post-text">'+escH(post.content)+'</div>'+
    '</div>';
  }).join('') : '<div class="empty-posts">No community posts about '+symbol+' yet</div>';

  content.innerHTML =
    '<div class="modal-header">'+
      '<div>'+
        '<div class="modal-ticker" onclick="event.stopPropagation()">'+symbol+'</div>'+
        '<div class="modal-name">'+(name||p.name||symbol)+'</div>'+
      '</div>'+
      '<div style="display:flex;align-items:flex-start;gap:12px">'+
        '<div class="modal-price-block">'+
          '<div class="modal-price">'+priceStr+'</div>'+
          '<div class="modal-chg '+chgCls+'">'+chgAmt+' ('+chgStr+')</div>'+
        '</div>'+
        '<button class="modal-close" onclick="closeModalBtn()">✕</button>'+
      '</div>'+
    '</div>'+
    '<div class="modal-body">'+
      '<div class="modal-stats">'+
        '<div class="modal-stat"><div class="modal-stat-label">P/E Ratio</div><div class="modal-stat-val">'+(p.pe?p.pe.toFixed(1):'—')+'</div></div>'+
        '<div class="modal-stat"><div class="modal-stat-label">RSI (14)</div><div class="modal-stat-val '+(p.rsi>=70?'chg-neg':p.rsi<=30?'chg-pos':'chg-neu')+'">'+(p.rsi!=null?p.rsi:'—')+'</div></div>'+
        '<div class="modal-stat"><div class="modal-stat-label">1W Change</div><div class="modal-stat-val '+(p.change1w>0?'chg-pos':p.change1w<0?'chg-neg':'chg-neu')+'">'+(p.change1w!=null?(p.change1w>=0?'+':'')+p.change1w.toFixed(2)+'%':'—')+'</div></div>'+
        '<div class="modal-stat"><div class="modal-stat-label">1M Change</div><div class="modal-stat-val '+(p.change1m>0?'chg-pos':p.change1m<0?'chg-neg':'chg-neu')+'">'+(p.change1m!=null?(p.change1m>=0?'+':'')+p.change1m.toFixed(2)+'%':'—')+'</div></div>'+
        '<div class="modal-stat"><div class="modal-stat-label">52W High</div><div class="modal-stat-val">'+(p.high52?fmtPrice(p.high52):'—')+'</div></div>'+
        '<div class="modal-stat"><div class="modal-stat-label">52W Low</div><div class="modal-stat-val">'+(p.low52?fmtPrice(p.low52):'—')+'</div></div>'+
      '</div>'+
      (p.sparkData&&p.sparkData.length ? '<div class="modal-chart-wrap"><div class="modal-chart-title">1 Month Price Chart</div><canvas id="modal-chart" height="80"></canvas></div>' : '')+
      '<div class="modal-posts"><div class="modal-posts-title">Community Posts</div>'+postsHtml+'</div>'+
    '</div>';

  // Draw chart
  if (p.sparkData && p.sparkData.length) {
    var ctx = document.getElementById('modal-chart');
    if (ctx) {
      var first = p.sparkData[0];
      var last = p.sparkData[p.sparkData.length-1];
      var lineColor = last >= first ? '#2ecc8a' : '#ff5263';
      modalChart = new Chart(ctx, {
        type:'line',
        data:{
          labels: p.sparkData.map(function(_,i){return '';}),
          datasets:[{data:p.sparkData,borderColor:lineColor,borderWidth:2,fill:true,backgroundColor:'rgba('+( last>=first?'46,204,138':'255,82,99')+',0.08)',pointRadius:0,tension:.3}]
        },
        options:{plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}},animation:{duration:400}}
      });
    }
  }
}

function closeModal(e) { if(e.target===document.getElementById('stock-modal')) closeModalBtn(); }
function closeModalBtn() {
  document.getElementById('stock-modal').classList.remove('show');
  document.body.style.overflow='';
  if(modalChart){modalChart.destroy();modalChart=null;}
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModalBtn();});

// ── SORT ──
function sortTable(col) {
  if (sortCol===col) sortDir*=-1; else { sortCol=col; sortDir=1; }
  screenerTickers.sort(function(a,b) {
    var pa=priceCache[a.symbol]||{}, pb=priceCache[b.symbol]||{};
    var va = col==='symbol'?a.symbol : col==='price'?pa.price : col==='change'?pa.change : col==='change1w'?pa.change1w : col==='change1m'?pa.change1m : col==='rsi'?pa.rsi : col==='pe'?pa.pe : pa.volume;
    var vb = col==='symbol'?b.symbol : col==='price'?pb.price : col==='change'?pb.change : col==='change1w'?pb.change1w : col==='change1m'?pb.change1m : col==='rsi'?pb.rsi : col==='pe'?pb.pe : pb.volume;
    if(va==null)return 1;if(vb==null)return-1;
    return va>vb?sortDir:va<vb?-sortDir:0;
  });
  renderScreener();
}

// ── TABS ──
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('view-screener').style.display = tab==='screener'?'block':'none';
  document.getElementById('view-watchlist').style.display = tab==='watchlist'?'block':'none';
  document.getElementById('tab-screener').classList.toggle('active',tab==='screener');
  document.getElementById('tab-watchlist').classList.toggle('active',tab==='watchlist');
}

// ── HELPERS ──
function fmtPrice(p) {
  if (!p) return '—';
  return p >= 1000 ? p.toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2}) : p.toFixed(2);
}
function fmtChg(c) { return (c>=0?'+':'')+c.toFixed(2); }
function fmtVol(v) { return v>=1e9?(v/1e9).toFixed(1)+'B':v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':v; }
function escH(t) { if(!t)return''; return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escJ(t) { if(!t)return''; return t.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function getTimeAgo(ts){var s=Math.floor((Date.now()-new Date(ts))/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}

init();
