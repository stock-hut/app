<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stockhut — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#09090f;--bg2:#111118;--bg3:#18181f;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);--text:#eeeef2;--muted:#5f5f78;--soft:#9898b0;--purple:#7c6fff;--teal:#4ecdc4;--green:#2ecc8a;--red:#ff5263}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif}
body{display:flex;flex-direction:column;min-height:100vh;background-image:radial-gradient(ellipse at 50% 0%,rgba(249,168,37,0.05) 0%,transparent 60%)}
.topnav{padding:16px 28px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.logo-mark{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--text)}
.logo-name{font-size:15px;font-weight:800;letter-spacing:-.4px}
.logo-tld{color:var(--teal)}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:36px;width:100%;max-width:400px;box-shadow:0 24px 60px rgba(0,0,0,0.5)}
.card-icon{font-size:32px;margin-bottom:14px}
.card-title{font-size:22px;font-weight:800;letter-spacing:-.8px;margin-bottom:6px}
.card-sub{font-size:13px;color:var(--soft);margin-bottom:28px;line-height:1.65}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.field label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;font-weight:600}
.field input{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;transition:border-color .15s;width:100%}
.field input:focus{border-color:var(--purple)}
.field input::placeholder{color:var(--muted)}
.btn-primary{width:100%;padding:12px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all .15s;margin-bottom:14px}
.btn-primary:hover{background:#6858e8;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.back-link{text-align:center;font-size:13px;color:var(--muted)}
.back-link a{color:var(--purple);text-decoration:none;font-weight:600}
.error-msg{background:rgba(255,82,99,0.08);border:1px solid rgba(255,82,99,0.2);border-radius:7px;padding:9px 12px;font-size:12px;color:#ff8f9a;display:none;margin-bottom:12px}
.error-msg.show{display:block}
.success-msg{background:rgba(46,204,138,0.08);border:1px solid rgba(46,204,138,0.2);border-radius:8px;padding:11px 14px;font-size:13px;color:var(--green);display:none;margin-bottom:14px;line-height:1.6}
.success-msg.show{display:block}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:5px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.footer-bar{padding:14px;border-top:1px solid var(--border);text-align:center;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
</style>
</head>
<body>
<div class="topnav">
  <a class="logo-mark" href="index.html">
    <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
      <rect x="6" y="16" width="20" height="14" rx="2" fill="#1e1e35" stroke="#7c6fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="4,18 16,5 28,18" fill="none" stroke="#7c6fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="12" y="22" width="8" height="8" rx="1" fill="#09090f" stroke="#7c6fff" stroke-width="1.2"/>
      <polyline points="4,24 9,19 14,21 20,15 27,10" fill="none" stroke="#4ecdc4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="20" cy="15" r="1.8" fill="#4ecdc4"/>
      <circle cx="27" cy="10" r="2.2" fill="#4ecdc4"/>
    </svg>
    <span class="logo-name">Stockhut<span class="logo-tld">.co</span></span>
  </a>
</div>
<div class="main">
  <div class="card" id="request-card">
    <div class="card-icon">🔑</div>
    <div class="card-title">Reset your password</div>
    <div class="card-sub">Enter your email and we will send you a link to reset your password.</div>
    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>
    <div class="field"><label>Email address</label><input type="email" id="email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')sendReset()"></div>
    <button class="btn-primary" id="reset-btn" onclick="sendReset()">Send Reset Link</button>
    <div class="back-link"><a href="login.html">Back to sign in</a></div>
  </div>
  <div class="card" id="new-password-card" style="display:none">
    <div class="card-icon">🔒</div>
    <div class="card-title">Set new password</div>
    <div class="card-sub">Choose a strong new password for your Stockhut account.</div>
    <div class="error-msg" id="error-msg-2"></div>
    <div class="field"><label>New Password</label><input type="password" id="new-password" placeholder="Min. 8 characters"></div>
    <div class="field"><label>Confirm Password</label><input type="password" id="confirm-new-password" placeholder="Repeat password" onkeydown="if(event.key==='Enter')updatePassword()"></div>
    <button class="btn-primary" id="update-btn" onclick="updatePassword()">Update Password</button>
  </div>
</div>
<div class="footer-bar">Not financial advice &nbsp;&middot;&nbsp; &copy; 2026 Stockhut</div>
<script>
var _supa = window.supabase.createClient(
  'https://wmuywxaglwcfqceppxll.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndtdXl3eGFnbHdjZnFjZXBweGxsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NzM3NTcsImV4cCI6MjA5NDE0OTc1N30.HXNXSEMO6pfODeIqPIVQ1AHNRiK7KsVnSH7TKS_Q3Y0'
);
_supa.auth.onAuthStateChange(function(event){
  if(event==='PASSWORD_RECOVERY'){
    document.getElementById('request-card').style.display='none';
    document.getElementById('new-password-card').style.display='block';
  }
});
async function sendReset(){
  var email=document.getElementById('email').value.trim();
  var errEl=document.getElementById('error-msg');
  if(!email){errEl.textContent='Please enter your email.';errEl.classList.add('show');return;}
  var btn=document.getElementById('reset-btn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Sending...';
  var r=await _supa.auth.resetPasswordForEmail(email,{redirectTo:'https://stockhut.co/reset.html'});
  btn.disabled=false;btn.innerHTML='Send Reset Link';
  if(r.error){errEl.textContent=r.error.message;errEl.classList.add('show');return;}
  document.getElementById('success-msg').innerHTML='Reset link sent. Check your email inbox — the link expires in 1 hour.';
  document.getElementById('success-msg').classList.add('show');
  errEl.classList.remove('show');
  document.getElementById('email').disabled=true;
  btn.style.display='none';
}
async function updatePassword(){
  var np=document.getElementById('new-password').value;
  var cp=document.getElementById('confirm-new-password').value;
  var errEl=document.getElementById('error-msg-2');
  if(np.length<8){errEl.textContent='Password must be at least 8 characters.';errEl.classList.add('show');return;}
  if(np!==cp){errEl.textContent='Passwords do not match.';errEl.classList.add('show');return;}
  var btn=document.getElementById('update-btn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Updating...';
  var r=await _supa.auth.updateUser({password:np});
  if(r.error){errEl.textContent=r.error.message;errEl.classList.add('show');btn.disabled=false;btn.innerHTML='Update Password';return;}
  btn.innerHTML='Password updated!';
  setTimeout(function(){window.location.href='login.html';},1500);
}
</script>
</body>
</html>
