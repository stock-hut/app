<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stockhut — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#09090f;--bg2:#111118;--bg3:#18181f;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);--text:#eeeef2;--muted:#5f5f78;--soft:#9898b0;--purple:#7c6fff;--teal:#4ecdc4;--green:#2ecc8a;--red:#ff5263}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif}
body{display:flex;flex-direction:column;min-height:100vh;background-image:radial-gradient(ellipse at 50% 0%,rgba(124,111,255,0.08) 0%,transparent 60%)}
.topnav{padding:16px 28px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.logo-mark{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--text)}
.logo-name{font-size:15px;font-weight:800;letter-spacing:-.4px}
.logo-tld{color:var(--teal)}
.topnav-right{font-size:12px;color:var(--muted)}
.topnav-right a{color:var(--purple);text-decoration:none;font-weight:600}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:36px;width:100%;max-width:400px;box-shadow:0 24px 60px rgba(0,0,0,0.5)}
.card-title{font-size:22px;font-weight:800;letter-spacing:-.8px;margin-bottom:6px}
.card-sub{font-size:13px;color:var(--soft);margin-bottom:28px;line-height:1.6}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.field label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;font-weight:600}
.field input{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:11px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;transition:border-color .15s;width:100%}
.field input:focus{border-color:var(--purple)}
.field input::placeholder{color:var(--muted)}
.forgot{display:flex;justify-content:flex-end;margin-top:-6px;margin-bottom:16px}
.forgot a{font-size:11px;color:var(--muted);text-decoration:none;transition:color .15s;font-family:'DM Mono',monospace}
.forgot a:hover{color:var(--soft)}
.btn-primary{width:100%;padding:12px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all .15s}
.btn-primary:hover{background:#6858e8;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--muted);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border2)}
.btn-google{width:100%;padding:11px;background:var(--bg3);color:var(--text);border:1px solid var(--border2);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Syne',sans-serif;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:9px}
.btn-google:hover{border-color:var(--border2);background:var(--bg)}
.signup-link{text-align:center;margin-top:20px;font-size:13px;color:var(--muted)}
.signup-link a{color:var(--purple);text-decoration:none;font-weight:600}
.error-msg{background:rgba(255,82,99,0.08);border:1px solid rgba(255,82,99,0.2);border-radius:7px;padding:9px 12px;font-size:12px;color:#ff8f9a;display:none;margin-bottom:12px}
.error-msg.show{display:block}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:5px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.footer-bar{padding:14px;border-top:1px solid var(--border);text-align:center;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.footer-bar a{color:var(--muted);text-decoration:none}
</style>
</head>
<body>
<div class="topnav">
  <a class="logo-mark" href="index.html">
    <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
      <rect x="6" y="16" width="20" height="14" rx="2" fill="#1e1e35" stroke="#7c6fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="4,18 16,5 28,18" fill="none" stroke="#7c6fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="12" y="22" width="8" height="8" rx="1" fill="#09090f" stroke="#7c6fff" stroke-width="1.2"/>
      <polyline points="4,24 9,19 14,21 20,15 27,10" fill="none" stroke="#4ecdc4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="20" cy="15" r="1.8" fill="#4ecdc4"/>
      <circle cx="27" cy="10" r="2.2" fill="#4ecdc4"/>
    </svg>
    <span class="logo-name">Stockhut<span class="logo-tld">.co</span></span>
  </a>
  <div class="topnav-right">No account? <a href="signup.html">Sign up</a></div>
</div>
<div class="main">
  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to your Stockhut account to access your portfolio, watchlist and research feed.</div>
    <div class="error-msg" id="error-msg"></div>
    <div class="field">
      <label>Email address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doSignIn()">
    </div>
    <div class="forgot"><a href="reset.html">Forgot password?</a></div>
    <button class="btn-primary" id="signin-btn" onclick="doSignIn()">Sign In</button>
    <div class="divider">or</div>
    <button class="btn-google" onclick="doGoogleSignIn()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <div class="signup-link">No account? <a href="signup.html">Create one free</a></div>
  </div>
</div>
<div class="footer-bar"><a href="index.html">Home</a> &nbsp;&middot;&nbsp; Not financial advice &nbsp;&middot;&nbsp; &copy; 2026 Stockhut</div>
<script>
var _supa = window.supabase.createClient(
  'https://wmuywxaglwcfqceppxll.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndtdXl3eGFnbHdjZnFjZXBweGxsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NzM3NTcsImV4cCI6MjA5NDE0OTc1N30.HXNXSEMO6pfODeIqPIVQ1AHNRiK7KsVnSH7TKS_Q3Y0'
);
_supa.auth.getSession().then(function(r){ if(r.data&&r.data.session) window.location.href='community.html'; });
function showError(msg){var el=document.getElementById('error-msg');el.textContent=msg;el.classList.add('show');}
function setLoading(on){var btn=document.getElementById('signin-btn');btn.disabled=on;btn.innerHTML=on?'<span class="spinner"></span>Signing in...':'Sign In';}
async function doSignIn(){
  var email=document.getElementById('email').value.trim();
  var password=document.getElementById('password').value;
  if(!email||!password){showError('Please enter your email and password.');return;}
  setLoading(true);
  var r=await _supa.auth.signInWithPassword({email:email,password:password});
  setLoading(false);
  if(r.error){showError(r.error.message);return;}
  window.location.href='community.html';
}
async function doGoogleSignIn(){
  var r=await _supa.auth.signInWithOAuth({provider:'google',options:{redirectTo:'https://stockhut.co/community.html'}});
  if(r.error)showError(r.error.message);
}
</script>
</body>
</html>
